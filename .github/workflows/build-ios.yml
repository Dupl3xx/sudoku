name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          echo "Available Xcode versions:"
          ls /Applications/ | grep -i xcode || true
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
            echo "Selected: $LATEST"
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Set build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          python3 -c "
          import json
          with open('app.json') as f: d = json.load(f)
          d['expo']['ios']['buildNumber'] = str($BUILD_NUM)
          d['expo']['version'] = '1.0.$BUILD_NUM'
          with open('app.json', 'w') as f: json.dump(d, f, indent=2)
          print('Version set to 1.0.$BUILD_NUM, build $BUILD_NUM')
          "

      - name: Run Expo Prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install Apple signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "Installed certificates:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/c14dc640-8681-4ff9-96b9-1fe4ee0a08a1.mobileprovision"
          echo "Provisioning profile installed: c14dc640-8681-4ff9-96b9-1fe4ee0a08a1"

      - name: Fix Xcode signing settings (use iPhone Developer)
        run: |
          PBXPROJ="ios/Sudoku.xcodeproj/project.pbxproj"

          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Distribution";/CODE_SIGN_IDENTITY = "iPhone Developer";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Distribution";/CODE_SIGN_IDENTITY = "iPhone Developer";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iOS Distribution";/CODE_SIGN_IDENTITY = "iPhone Developer";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"

          echo "Signing settings after fix:"
          grep -E "CODE_SIGN|PROVISIONING_PROFILE|DEVELOPMENT_TEAM" "$PBXPROJ" | sort -u

      - name: Set provisioning profile UUID in Xcode project
        run: |
          PBXPROJ="ios/Sudoku.xcodeproj/project.pbxproj"
          PROFILE_UUID="c14dc640-8681-4ff9-96b9-1fe4ee0a08a1"

          python3 - <<EOF
          import re

          with open("$PBXPROJ", "r") as f:
              content = f.read()

          content = re.sub(
              r'PROVISIONING_PROFILE_SPECIFIER = "[^"]*";',
              'PROVISIONING_PROFILE_SPECIFIER = "$PROFILE_UUID";',
              content
          )

          if "PROVISIONING_PROFILE_SPECIFIER" not in content:
              content = content.replace(
                  'CODE_SIGN_IDENTITY = "iPhone Developer";',
                  'CODE_SIGN_IDENTITY = "iPhone Developer";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "$PROFILE_UUID";'
              )

          with open("$PBXPROJ", "w") as f:
              f.write(content)

          print("Updated PROVISIONING_PROFILE_SPECIFIER to $PROFILE_UUID")
          EOF

      - name: Install xcpretty
        run: gem install xcpretty --no-document 2>/dev/null || true

      - name: Build iOS app with xcodebuild
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/Sudoku.xcarchive"

          echo "Starting xcodebuild archive..."
          cd ios

          xcodebuild archive \
            -workspace Sudoku.xcworkspace \
            -scheme Sudoku \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="RW4Q5ZGHM2" \
            PROVISIONING_PROFILE="c14dc640-8681-4ff9-96b9-1fe4ee0a08a1" \
            PRODUCT_BUNDLE_IDENTIFIER="com.ondrejlevy.sudoku.RW4Q5ZGHM2" \
            -allowProvisioningUpdates 2>&1 | tee /tmp/xcodebuild.log
          BUILD_EXIT=${PIPESTATUS[0]}

          echo "Build exit code: $BUILD_EXIT"

          if [ $BUILD_EXIT -ne 0 ] || [ ! -d "$ARCHIVE_PATH" ]; then
            echo "ERROR: Build failed (exit $BUILD_EXIT)"
            echo "=== ERRORS FROM BUILD LOG ==="
            grep -E "error:|fatal error:|Build FAILED" /tmp/xcodebuild.log | grep -v "^note:" | head -50 || true
            echo "=== LAST 30 LINES ==="
            tail -30 /tmp/xcodebuild.log
            exit 1
          fi

          echo "Archive created successfully at $ARCHIVE_PATH"
          ls -la "$ARCHIVE_PATH/"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ github.run_number }}
          path: /tmp/xcodebuild.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Export IPA from archive
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>RW4Q5ZGHM2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Developer</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ondrejlevy.sudoku.RW4Q5ZGHM2</key>
              <string>c14dc640-8681-4ff9-96b9-1fe4ee0a08a1</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Sudoku.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          ls "$RUNNER_TEMP/export/"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sudoku-iOS-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release with IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IPA_SRC=$(ls "$RUNNER_TEMP/export/"*.ipa)
          IPA_NAME="Sudoku-v1.0.${{ github.run_number }}.ipa"
          cp "$IPA_SRC" "$RUNNER_TEMP/$IPA_NAME"

          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest \
            --repo ${{ github.repository }} \
            --title "Sudoku v1.0.${{ github.run_number }}" \
            --notes "Build #${{ github.run_number }} — $(date '+%Y-%m-%d %H:%M')" \
            --latest \
            "$RUNNER_TEMP/$IPA_NAME"

          IPA_URL="https://github.com/${{ github.repository }}/releases/download/latest/$IPA_NAME"
          VERSION="1.0.${{ github.run_number }}"
          INSTALL_URL="itms-services://?action=download-manifest&url=https://dupl3xx.github.io/sudoku/manifest.plist"

          cp docs/manifest.template.plist docs/manifest.plist
          sed -i '' "s|IPA_URL_PLACEHOLDER|${IPA_URL}|g" docs/manifest.plist
          sed -i '' "s|VERSION_PLACEHOLDER|${VERSION}|g" docs/manifest.plist

          sed -i '' "s|v[0-9]*\.[0-9]*\.[0-9]*|v${VERSION}|g" docs/index.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/manifest.plist docs/index.html
          git commit -m "Update OTA manifest to v${VERSION}" || true
          git pull --rebase origin main || true
          git push origin main

          echo ""
          echo "=== INSTALACE NA IPHONE ==="
          echo "Otevri na iPhonu v Safari:"
          echo "https://dupl3xx.github.io/sudoku/"
          echo ""
          echo "Primy install link: ${INSTALL_URL}"
          echo "==========================="
